<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anh Thơ Spa</title>

  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Inter with full Vietnamese precomposed characters support -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Tailwind CSS is now loaded from local build instead of CDN -->

  <script type="importmap">
    {
      "imports": {
        "react/": "https://aistudiocdn.com/react@^19.2.0/",
        "react": "https://aistudiocdn.com/react@^19.2.0",
        "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
        "react-router-dom": "https://aistudiocdn.com/react-router-dom@^7.9.5",
        "@google/genai": "https://aistudiocdn.com/@google/genai@^1.28.0",
        "uuid": "https://aistudiocdn.com/uuid@^13.0.0"
      }
    }
    </script>
</head>

<body class="bg-gray-50 font-sans text-brand-text selection:bg-brand-primary selection:text-white">
  <div id="root"></div>
  <script>
    // Redirect verify-email URLs without # to hash URLs before React app loads
    if (window.location.pathname.startsWith('/verify-email/') && !window.location.hash) {
      const pathToken = window.location.pathname.replace('/verify-email/', '');
      window.location.href = `/#/verify-email/${pathToken}`;
    }
    // Redirect reset-password URLs without # to hash URLs before React app loads
    if (window.location.pathname.startsWith('/reset-password/') && !window.location.hash) {
      const pathToken = window.location.pathname.replace('/reset-password/', '');
      window.location.href = `/#/reset-password/${pathToken}`;
    }
  </script>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
